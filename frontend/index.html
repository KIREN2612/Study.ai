<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study.AI — JEE · NEET Assistant</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          leaf: {
            50:  '#f1faf0',
            100: '#ddf3d9',
            200: '#b8e5b2',
            300: '#87cf7f',
            400: '#56b44d',
            500: '#34973a',
            600: '#27782e',
            700: '#1e5e24',
            800: '#184b1e',
            900: '#103614',
          }
        },
        fontFamily: {
          display: ['Fraunces', 'serif'],
          body:    ['DM Sans', 'sans-serif'],
          mono:    ['JetBrains Mono', 'monospace'],
        }
      }
    }
  }
</script>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; }
  .sidebar-scroll::-webkit-scrollbar { width: 3px; }
  .sidebar-scroll::-webkit-scrollbar-thumb { background: #b8e5b2; border-radius: 2px; }
  .chat-scroll::-webkit-scrollbar { width: 4px; }
  .chat-scroll::-webkit-scrollbar-thumb { background: #b8e5b2; border-radius: 2px; }

  /* Book spines */
  .book-spine {
    border-radius: 2px 2px 0 0;
    width: 14px;
    flex-shrink: 0;
    transition: height 0.3s ease;
  }

  /* Message animation */
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-anim { animation: msgIn 0.25s ease forwards; }

  /* Typing dots */
  @keyframes blink {
    0%, 100% { opacity: 0.2; transform: translateY(0); }
    50%       { opacity: 1;   transform: translateY(-3px); }
  }
  .dot1 { animation: blink 1.2s ease-in-out infinite; }
  .dot2 { animation: blink 1.2s ease-in-out infinite 0.2s; }
  .dot3 { animation: blink 1.2s ease-in-out infinite 0.4s; }

  /* Sidebar active state */
  .nav-item { transition: background 0.15s, color 0.15s; }
  .nav-item:hover, .nav-item.active {
    background: #ddf3d9;
    color: #1e5e24;
  }
  .nav-item.active .nav-icon { color: #27782e; }

  /* Input focus ring override */
  .chat-input:focus { outline: none; }

  /* Chip hover */
  .chip { transition: background 0.15s, border-color 0.15s; }
  .chip:hover { background: #ddf3d9; border-color: #87cf7f; }

  /* Upload button */
  .upload-btn { transition: background 0.15s, border-color 0.15s; }
  .upload-btn:hover { background: #ddf3d9; border-color: #56b44d; }

  /* Send button */
  .send-btn { transition: opacity 0.15s; }
  .send-btn:hover { opacity: 0.85; }

  /* Toast */
  @keyframes toastIn  { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  @keyframes toastOut { from { opacity:1; } to { opacity:0; } }
  .toast-show { animation: toastIn 0.2s ease forwards; }
  .toast-hide { animation: toastOut 0.3s ease forwards; }

  /* Mobile sidebar toggle */
  @media (max-width: 768px) {
    #sidebar { transform: translateX(-100%); transition: transform 0.25s ease; position: fixed; z-index: 50; height: 100%; }
    #sidebar.open { transform: translateX(0); }
    #overlay { display: none; }
    #overlay.open { display: block; }
  }
</style>
</head>
<body class="bg-leaf-50 h-screen flex overflow-hidden">

<!-- Mobile overlay -->
<div id="overlay" class="fixed inset-0 bg-black/20 z-40 hidden" onclick="toggleSidebar()"></div>

<!-- ════════════════════════════════════════════════
     SIDEBAR
════════════════════════════════════════════════ -->
<aside id="sidebar" class="w-60 bg-white border-r border-leaf-200 flex flex-col flex-shrink-0 h-full">

  <!-- Logo -->
  <div class="px-5 py-5 border-b border-leaf-100">
    <div class="font-display text-2xl font-semibold text-leaf-700 leading-none">
      Study<span class="text-leaf-400">.</span>AI
    </div>
    <div class="font-mono text-[10px] text-leaf-400 tracking-widest mt-1 uppercase">JEE · NEET Assistant</div>
  </div>

  <!-- Nav -->
  <nav class="px-3 pt-4 flex-1 overflow-y-auto sidebar-scroll space-y-0.5">

    <!-- Main -->
    <p class="font-mono text-[9px] text-leaf-400 tracking-widest uppercase px-2 mb-2">Main</p>
    <button onclick="setView('chat')" id="nav-chat" class="nav-item active nav-icon w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-leaf-700 font-medium">
      <i class="ti ti-message-circle nav-icon text-leaf-500 text-base"></i> Chat
    </button>
    <button onclick="setView('history')" id="nav-history" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-leaf-600">
      <i class="ti ti-history nav-icon text-leaf-400 text-base"></i> History
    </button>

    <!-- Resources -->
    <p class="font-mono text-[9px] text-leaf-400 tracking-widest uppercase px-2 mt-5 mb-2">Resources</p>
    <button onclick="selectSubject('Physics')" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-leaf-600">
      <i class="ti ti-atom nav-icon text-leaf-400 text-base"></i>
      <span>Physics</span>
      <span class="ml-auto font-mono text-[10px] bg-leaf-100 text-leaf-600 px-2 py-0.5 rounded-full">Ch 1–15</span>
    </button>
    <button onclick="selectSubject('Chemistry')" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-leaf-600">
      <i class="ti ti-flask nav-icon text-leaf-400 text-base"></i>
      <span>Chemistry</span>
      <span class="ml-auto font-mono text-[10px] bg-leaf-100 text-leaf-600 px-2 py-0.5 rounded-full">Ch 1–12</span>
    </button>
    <button onclick="selectSubject('Biology')" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-leaf-600">
      <i class="ti ti-dna nav-icon text-leaf-400 text-base"></i>
      <span>Biology</span>
      <span class="ml-auto font-mono text-[10px] bg-leaf-100 text-leaf-600 px-2 py-0.5 rounded-full">Ch 1–22</span>
    </button>
    <button class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-leaf-600">
      <i class="ti ti-file-text nav-icon text-leaf-400 text-base"></i>
      <span>Uploaded PDFs</span>
      <span id="pdf-count" class="ml-auto font-mono text-[10px] bg-leaf-100 text-leaf-600 px-2 py-0.5 rounded-full">0</span>
    </button>

    <!-- Tools -->
    <p class="font-mono text-[9px] text-leaf-400 tracking-widest uppercase px-2 mt-5 mb-2">Tools</p>
    <button class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-leaf-600">
      <i class="ti ti-pencil nav-icon text-leaf-400 text-base"></i> Practice MCQs
    </button>
    <button class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-leaf-600">
      <i class="ti ti-chart-bar nav-icon text-leaf-400 text-base"></i> Progress
    </button>
    <button class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-leaf-600">
      <i class="ti ti-settings nav-icon text-leaf-400 text-base"></i> Settings
    </button>
  </nav>

  <!-- Book shelf art -->
  <div class="px-4 pt-3 pb-4 border-t border-leaf-100">
    <div class="flex items-end gap-[3px] h-14 mb-2" id="bookshelf">
      <!-- JS renders books here -->
    </div>
    <p class="font-mono text-[10px] text-leaf-400 text-center tracking-wider">Your study shelf</p>
  </div>
</aside>

<!-- ════════════════════════════════════════════════
     MAIN CONTENT
════════════════════════════════════════════════ -->
<main class="flex-1 flex flex-col min-w-0 overflow-hidden">

  <!-- Top bar -->
  <header class="bg-white border-b border-leaf-200 px-5 py-3 flex items-center justify-between flex-shrink-0">
    <div class="flex items-center gap-3">
      <!-- Mobile hamburger -->
      <button onclick="toggleSidebar()" class="md:hidden text-leaf-500 text-xl">
        <i class="ti ti-menu-2"></i>
      </button>
      <div>
        <div id="topbar-title" class="font-display text-base font-semibold text-leaf-800">Ask your textbook</div>
        <div id="topbar-sub" class="font-mono text-[10px] text-leaf-400 tracking-wide mt-0.5">NCERT Physics · Chapter 1 active</div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <!-- AI status -->
      <div class="hidden sm:flex items-center gap-2 mr-2">
        <span class="w-2 h-2 rounded-full bg-leaf-400 animate-pulse"></span>
        <span class="font-mono text-[10px] text-leaf-500 tracking-widest uppercase">Ready</span>
      </div>
      <!-- Upload button -->
      <label class="upload-btn flex items-center gap-2 px-3 py-1.5 rounded-full border border-leaf-300 bg-leaf-50 text-leaf-700 text-xs font-medium cursor-pointer">
        <i class="ti ti-upload text-sm text-leaf-500"></i>
        <span class="hidden sm:inline">Upload PDF</span>
        <input type="file" accept=".pdf" class="hidden" onchange="handleUpload(this)">
      </label>
      <!-- Clear chat -->
      <button onclick="clearChat()" title="Clear chat" class="upload-btn flex items-center gap-1 px-3 py-1.5 rounded-full border border-leaf-200 bg-leaf-50 text-leaf-500 text-xs cursor-pointer">
        <i class="ti ti-trash text-sm"></i>
      </button>
    </div>
  </header>

  <!-- Chat body -->
  <div class="flex-1 overflow-y-auto chat-scroll px-4 sm:px-8 py-6 flex flex-col gap-4" id="chat-body">

    <!-- Welcome state -->
    <div id="welcome-state" class="flex-1 flex flex-col items-center justify-center gap-4 my-auto py-10">
      <div class="w-16 h-16 rounded-2xl bg-leaf-100 flex items-center justify-center border border-leaf-200">
        <i class="ti ti-books text-3xl text-leaf-500"></i>
      </div>
      <div class="text-center">
        <div class="font-display text-xl text-leaf-800 font-semibold">What do you want to study?</div>
        <div class="text-sm text-leaf-500 mt-1 leading-relaxed">Ask anything from your NCERT textbooks.<br>I'll answer with source excerpts.</div>
      </div>
      <div class="flex flex-wrap gap-2 justify-center mt-1 max-w-lg">
        <button class="chip px-3 py-1.5 rounded-full border border-leaf-200 bg-white text-sm text-leaf-600" onclick="askChip('What is dimensional analysis?')">Dimensional analysis</button>
        <button class="chip px-3 py-1.5 rounded-full border border-leaf-200 bg-white text-sm text-leaf-600" onclick="askChip('Explain significant figures')">Significant figures</button>
        <button class="chip px-3 py-1.5 rounded-full border border-leaf-200 bg-white text-sm text-leaf-600" onclick="askChip('What are SI base units?')">SI base units</button>
        <button class="chip px-3 py-1.5 rounded-full border border-leaf-200 bg-white text-sm text-leaf-600" onclick="askChip('Derive equations of motion')">Equations of motion</button>
        <button class="chip px-3 py-1.5 rounded-full border border-leaf-200 bg-white text-sm text-leaf-600" onclick="askChip('What is Newton\\'s second law?')">Newton's 2nd law</button>
        <button class="chip px-3 py-1.5 rounded-full border border-leaf-200 bg-white text-sm text-leaf-600" onclick="askChip('Explain Bohr\\'s atomic model')">Bohr's atomic model</button>
      </div>
    </div>

  </div>

  <!-- Input bar -->
  <div class="bg-white border-t border-leaf-200 px-4 sm:px-8 py-4 flex-shrink-0">
    <div class="flex items-end gap-3 bg-leaf-50 border border-leaf-200 rounded-2xl px-4 py-3 focus-within:border-leaf-400 transition-colors">
      <textarea
        id="chat-input"
        class="chat-input flex-1 bg-transparent text-sm text-leaf-900 resize-none max-h-32 leading-relaxed placeholder-leaf-400"
        placeholder="Ask a question from your textbook..."
        rows="1",
        oninput="autoResize(this)"
        onkeydown="handleKey(event)"
      ></textarea>
      <button onclick="sendMessage()" class="send-btn w-8 h-8 rounded-full bg-leaf-500 hover:bg-leaf-600 flex items-center justify-center flex-shrink-0 border-none cursor-pointer">
        <i class="ti ti-arrow-up text-white text-sm"></i>
      </button>
    </div>
    <p class="font-mono text-[10px] text-leaf-400 mt-2 text-center tracking-wide">Enter to send · Shift+Enter for new line</p>
  </div>

</main>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 right-6 z-50 hidden">
  <div class="flex items-center gap-2 px-4 py-2.5 rounded-xl border text-sm font-medium shadow-sm" id="toast-inner"></div>
</div>

<!-- ════════════════════════════════════════════════
     JAVASCRIPT
════════════════════════════════════════════════ -->
<script>
/* ─── State ─── */
let messages = [];
let pdfCount  = 0;
let currentSubject = 'Physics';
let isLoading = false;

/* ─── Knowledge base (demo answers) ─── */
const KB = {
  'dimensional analysis': {
    answer: `Dimensional analysis is a technique used to check the correctness of equations and to convert units. Every physical quantity is expressed in terms of fundamental dimensions:<br><br>
    <span class="font-mono text-xs bg-leaf-50 border border-leaf-100 rounded px-2 py-1 block my-2">[M] Mass · [L] Length · [T] Time · [A] Current · [K] Temperature</span>
    The <strong>principle of homogeneity</strong> states that both sides of a valid physical equation must have identical dimensions. If they don't match, the equation is certainly wrong — though a dimensionally correct equation may still be physically incorrect.`,
    source: 'NCERT Physics Part I · Ch. 2 — Units & Measurements · p. 22'
  },
  'significant figures': {
    answer: `Significant figures are the digits in a measurement that are reliably known, plus one estimated digit. Key rules:<br><br>
    <ul class="list-disc ml-4 mt-1 space-y-1 text-sm">
      <li>All non-zero digits are significant</li>
      <li>Zeros between non-zero digits are significant</li>
      <li>Trailing zeros in a decimal number are significant</li>
      <li>Leading zeros (like 0.004) are <em>not</em> significant</li>
    </ul>`,
    source: 'NCERT Physics Part I · Ch. 2 — Units & Measurements · p. 26'
  },
  'si base units': {
    answer: `The SI system defines 7 base units:<br><br>
    <div class="font-mono text-xs bg-leaf-50 border border-leaf-100 rounded p-2 my-2 space-y-1">
      <div><span class="text-leaf-600">metre (m)</span> — length</div>
      <div><span class="text-leaf-600">kilogram (kg)</span> — mass</div>
      <div><span class="text-leaf-600">second (s)</span> — time</div>
      <div><span class="text-leaf-600">ampere (A)</span> — electric current</div>
      <div><span class="text-leaf-600">kelvin (K)</span> — thermodynamic temperature</div>
      <div><span class="text-leaf-600">mole (mol)</span> — amount of substance</div>
      <div><span class="text-leaf-600">candela (cd)</span> — luminous intensity</div>
    </div>
    All other SI units are derived from these 7.`,
    source: 'NCERT Physics Part I · Ch. 2 — Units & Measurements · p. 17'
  },
  'equations of motion': {
    answer: `The three kinematic equations for uniform acceleration are:<br><br>
    <div class="font-mono text-xs bg-leaf-50 border border-leaf-100 rounded p-3 my-2 space-y-2">
      <div><strong>v = u + at</strong></div>
      <div><strong>s = ut + ½at²</strong></div>
      <div><strong>v² = u² + 2as</strong></div>
    </div>
    where <em>u</em> = initial velocity, <em>v</em> = final velocity, <em>a</em> = uniform acceleration, <em>t</em> = time, <em>s</em> = displacement. These hold only when acceleration is constant.`,
    source: "NCERT Physics Part I · Ch. 3 — Motion in a Straight Line · p. 45"
  },
  "newton": {
    answer: `Newton's second law states that the net force acting on a body equals the rate of change of its linear momentum:<br><br>
    <div class="font-mono text-xs bg-leaf-50 border border-leaf-100 rounded p-3 my-2">
      <strong>F = ma</strong>&nbsp;&nbsp;(when mass is constant)
    </div>
    The SI unit of force is the <strong>newton (N)</strong> = kg·m/s². The law implies that force and acceleration are always in the same direction. It's the most powerful of the three laws as it gives a quantitative measure of force.`,
    source: "NCERT Physics Part I · Ch. 5 — Laws of Motion · p. 87"
  },
  "bohr": {
    answer: `Bohr's atomic model (1913) proposed three postulates:<br><br>
    <ol class="list-decimal ml-4 mt-1 space-y-1 text-sm">
      <li>Electrons revolve in fixed circular orbits (stationary states) without radiating energy.</li>
      <li>Only orbits where angular momentum = <em>nh/2π</em> (n = 1,2,3…) are allowed.</li>
      <li>Energy is emitted or absorbed only when an electron jumps between orbits: <em>E = hν</em>.</li>
    </ol><br>
    This successfully explained the <strong>hydrogen spectrum</strong> but failed for multi-electron atoms.`,
    source: "NCERT Chemistry Part I · Ch. 2 — Structure of Atom · p. 41"
  }
};

function getAnswer(q) {
  q = q.toLowerCase();
  for (const key in KB) {
    if (q.includes(key)) return KB[key];
  }
  return {
    answer: `That's a great question! Based on your NCERT textbooks, here's an explanation:<br><br>
    This concept involves understanding fundamental principles covered in the relevant chapter. The key ideas relate to how physical quantities interact and how we can use mathematical relationships to describe them accurately.<br><br>
    <em>For a more detailed answer, connect the backend with your actual NCERT PDF and the RAG pipeline will pull exact passages.</em>`,
    source: `NCERT ${currentSubject} · Relevant chapter`
  };
}

/* ─── Render bookshelf ─── */
function renderBookshelf() {
  const heights = [52, 42, 60, 36, 50, 44, 56, 38, 48, 58, 40, 54];
  const colors  = ['#87cf7f','#b8e5b2','#56b44d','#ddf3d9','#34973a','#a8d5a2','#27782e','#c8e6c0','#66bb6a','#43a047','#b2dfdb','#81c784'];
  const shelf   = document.getElementById('bookshelf');
  shelf.innerHTML = heights.map((h, i) =>
    `<div class="book-spine" style="height:${h}px;background:${colors[i % colors.length]}"></div>`
  ).join('');
}

/* ─── Chat rendering ─── */
function addMessage(role, content, source = '') {
  const welcome = document.getElementById('welcome-state');
  if (welcome) welcome.remove();

  const body = document.getElementById('chat-body');
  const isUser = role === 'user';
  const wrapper = document.createElement('div');
  wrapper.className = `flex gap-3 msg-anim ${isUser ? 'justify-end' : 'justify-start'}`;

  const avatarClass = isUser
    ? 'bg-leaf-100 border border-leaf-200 text-leaf-700'
    : 'bg-white border border-leaf-200 text-leaf-500';

  const bubbleClass = isUser
    ? 'bg-leaf-100 border border-leaf-200 text-leaf-900 rounded-2xl rounded-tr-sm'
    : 'bg-white border border-leaf-200 text-gray-800 rounded-2xl rounded-tl-sm';

  const sourceHtml = (!isUser && source) ? `
    <div class="mt-3 pt-2.5 border-t border-leaf-100 flex items-center gap-1.5">
      <i class="ti ti-bookmark text-xs text-leaf-400"></i>
      <span class="font-mono text-[10px] text-leaf-400 leading-tight">${source}</span>
    </div>` : '';

  wrapper.innerHTML = `
    ${!isUser ? `<div class="w-7 h-7 rounded-lg flex-shrink-0 mt-0.5 flex items-center justify-center ${avatarClass}">
      <i class="ti ti-robot text-xs"></i>
    </div>` : ''}
    <div class="max-w-[78%] px-4 py-3 text-sm leading-relaxed ${bubbleClass}">
      ${content}${sourceHtml}
    </div>
    ${isUser ? `<div class="w-7 h-7 rounded-lg flex-shrink-0 mt-0.5 flex items-center justify-center ${avatarClass}">
      <i class="ti ti-user text-xs"></i>
    </div>` : ''}
  `;

  body.appendChild(wrapper);
  body.scrollTop = body.scrollHeight;
  messages.push({ role, content });
}

function addTyping() {
  const welcome = document.getElementById('welcome-state');
  if (welcome) welcome.remove();
  const body = document.getElementById('chat-body');
  const div = document.createElement('div');
  div.id = 'typing-msg';
  div.className = 'flex gap-3 msg-anim';
  div.innerHTML = `
    <div class="w-7 h-7 rounded-lg flex-shrink-0 mt-0.5 flex items-center justify-center bg-white border border-leaf-200 text-leaf-500">
      <i class="ti ti-robot text-xs"></i>
    </div>
    <div class="px-4 py-3 rounded-2xl rounded-tl-sm bg-white border border-leaf-200 flex items-center gap-2">
      <span class="w-1.5 h-1.5 rounded-full bg-leaf-400 dot1"></span>
      <span class="w-1.5 h-1.5 rounded-full bg-leaf-400 dot2"></span>
      <span class="w-1.5 h-1.5 rounded-full bg-leaf-400 dot3"></span>
    </div>
  `;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-msg');
  if (t) t.remove();
}

/* ─── Send message ─── */
async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('chat-input');
  const q = input.value.trim();
  if (!q) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;

  addMessage('user', q);
  addTyping();

  // Try real backend first, fall back to demo
  try {
    const res = await fetch('/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q })
    });
    if (!res.ok) throw new Error('no backend');
    const data = await res.json();
    removeTyping();
    addMessage('assistant', data.answer, (data.sources || [])[0] || '');
  } catch {
    // Demo fallback
    await new Promise(r => setTimeout(r, 900 + Math.random() * 500));
    removeTyping();
    const { answer, source } = getAnswer(q);
    addMessage('assistant', answer, source);
  }

  isLoading = false;
  input.focus();
}

function askChip(q) {
  document.getElementById('chat-input').value = q;
  sendMessage();
}

/* ─── Keyboard + textarea ─── */
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 128) + 'px';
}

/* ─── Clear chat ─── */
function clearChat() {
  const body = document.getElementById('chat-body');
  body.innerHTML = `
    <div id="welcome-state" class="flex-1 flex flex-col items-center justify-center gap-4 my-auto py-10">
      <div class="w-16 h-16 rounded-2xl bg-leaf-100 flex items-center justify-center border border-leaf-200">
        <i class="ti ti-books text-3xl text-leaf-500"></i>
      </div>
      <div class="text-center">
        <div class="font-display text-xl text-leaf-800 font-semibold">What do you want to study?</div>
        <div class="text-sm text-leaf-500 mt-1 leading-relaxed">Ask anything from your NCERT textbooks.<br>I'll answer with source excerpts.</div>
      </div>
      <div class="flex flex-wrap gap-2 justify-center mt-1 max-w-lg">

/* ─── PDF upload ─── */
async function handleUpload(input) {
  const file = input.files[0];
  if (!file) return;
  showToast(`Indexing "${file.name}"…`, 'info');
  try {
    const form = new FormData();
    form.append('file', file);
    const res = await fetch('/upload', { method: 'POST', body: form });
    const data = await res.json();
    pdfCount++;
    document.getElementById('pdf-count').textContent = pdfCount;
    showToast(`✓ ${file.name} indexed`, 'success');
  } catch {
    pdfCount++;
    document.getElementById('pdf-count').textContent = pdfCount;
    showToast(`✓ ${file.name} ready (demo mode)`, 'success');
  }
  input.value = '';
}

/* ─── Subject selector ─── */
function selectSubject(subject) {
  currentSubject = subject;
  document.getElementById('topbar-title').textContent = `Ask your textbook`;
  document.getElementById('topbar-sub').textContent = `NCERT ${subject} · Active`;
  showToast(`Switched to ${subject}`, 'info');
}

/* ─── Nav active state ─── */
function setView(view) {
  document.querySelectorAll('[id^="nav-"]').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`nav-${view}`);
  if (el) el.classList.add('active');
}

/* ─── Mobile sidebar ─── */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

/* ─── Toast ─── */
function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  const inner = document.getElementById('toast-inner');
  const styles = {
    success: 'bg-leaf-50 border-leaf-300 text-leaf-700',
    error:   'bg-red-50 border-red-200 text-red-700',
    info:    'bg-blue-50 border-blue-200 text-blue-700',
  };
  inner.className = `flex items-center gap-2 px-4 py-2.5 rounded-xl border text-sm font-medium ${styles[type] || styles.success}`;
  inner.innerHTML = `<i class="ti ti-${type === 'error' ? 'alert-circle' : 'check'} text-base"></i> ${msg}`;
  toast.classList.remove('hidden', 'toast-hide');
  toast.classList.add('toast-show');
  setTimeout(() => {
    toast.classList.add('toast-hide');
    setTimeout(() => toast.classList.add('hidden'), 300);
  }, 3000);
}

/* ─── Init ─── */
renderBookshelf();
